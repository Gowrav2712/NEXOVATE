<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | NEXOVATE 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for Event Details Page */
        .event-details-body {
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .details-hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 5% 60px;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .details-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(2, 6, 16, 0.4), var(--bg-dark));
            z-index: 1;
        }

        .details-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
        }

        .info-panel {
            background: rgba(0, 20, 40, 0.4);
            border: 1px solid var(--neon-blue-glow);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .event-cat {
            font-family: var(--font-mono);
            color: var(--neon-blue);
            letter-spacing: 5px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .event-title-large {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 30px;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .event-desc {
            font-family: var(--font-mono);
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .prize-banner {
            background: var(--neon-blue);
            color: black;
            padding: 15px 30px;
            display: inline-block;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 40px;
            clip-path: polygon(0 0, 95% 0, 100% 50%, 95% 100%, 0 100%);
        }

        .action-btns {
            display: flex;
            gap: 20px;
        }

        .rules-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .side-block h4 {
            font-size: 1.2rem;
            color: var(--neon-blue);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--neon-blue-glow);
            padding-bottom: 5px;
        }

        .rules-list {
            list-style: none;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: #ccc;
        }

        .rules-list li {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }

        .rules-list li::before {
            content: ">>";
            position: absolute;
            left: 0;
            color: var(--neon-blue);
        }

        .contact-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-info .name { font-weight: 700; color: white; }
        .contact-info .phone { font-family: var(--font-mono); color: var(--neon-blue); font-size: 0.9rem; }

        .call-btn {
            background: var(--neon-blue-glow);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 5px 15px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .call-btn:hover { background: var(--neon-blue); color: black; }

        .back-btn {
            position: fixed;
            top: 100px;
            left: 5%;
            z-index: 1000;
            background: rgba(181, 0, 255, 0.2);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s;
            border-radius: 4px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover { 
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue-glow);
            transform: scale(1.1);
        }

        @media (max-width: 900px) {
            .details-content { grid-template-columns: 1fr; }
            .event-title-large { font-size: 2.5rem; }
            .back-btn { top: 90px; }
        }

        @media (max-width: 600px) {
            .action-btns {
                flex-direction: column;
                width: 100%;
                gap: 15px;
            }
            .action-btns .btn-outline {
                width: 100%;
                text-align: center;
                padding: 12px;
                font-size: 0.9rem;
            }
            .event-title-large { font-size: 2.2rem; }
            .prize-banner { font-size: 1rem; padding: 10px 20px; width: 100%; text-align: center; }
            .info-panel { background: rgba(0, 20, 40, 0.4); border: 1px solid var(--neon-blue-glow); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); padding: 40px; border-radius: 4px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        }
    </style>
</head>
<body class="event-details-body">
    <!-- FIXED BACKGROUND ELEMENTS (Same as index) -->

    </div>

    <header class="hud-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html" class="logo-link"><span class="logo-text">NEXOVATE</span></a>
            </div>
            <nav class="nav-links">
                <a href="index.html#technical">Events</a>
                <a href="index.html#hackathon">Hackathon</a>

            </nav>
        </div>
    </header>

    <a href="javascript:history.back()" class="back-btn">←</a>

    <main id="event-page-content">
        <section class="details-hero" id="event-hero">
            <div class="details-overlay"></div>
            <div class="details-content">

                    <div class="prize-banner" id="event-prize">PRIZE_POOL: ₹00,000</div>
                    <p class="event-desc" id="event-description">Initializing event protocol... Please wait for synchronization.</p>
                    
                    <div class="action-btns">
                        <a id="rulebook-link" class="btn-outline">RULE BOOK</a>
                        <a id="register-link" href="#" target="_blank" class="btn-outline">REGISTER</a>
                    </div>
                </div>

                <div class="rules-panel">
                    <div class="info-panel side-block">
                        <h4>RULES & GUIDELINES</h4>
                        <ul class="rules-list" id="event-rules">
                            <li>Loading rules from core system...</li>
                        </ul>
                    </div>

                    <div class="info-panel side-block">
                        <h4>EVENT COORDINATORS</h4>
                        <div id="event-contacts">
                            <!-- Contacts will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="hud-footer">
        <div class="footer-stats">
            <span id="cpu-load">CPU_LOAD: 42%</span>
            <span>UPLINK: AVJ</span>
        </div>
    </footer>

                title: "MAZE",

                rules: [

                ],
                coordinators: [

                description: "Participants compete in rounds testing logical reasoning, problem-solving, and general knowledge. The event includes quizzes, puzzles, and rapid-fire questions under time constraints. It evaluates analytical thinking and accuracy.",

                    "Launcher will be provided, or participants can bring their own."
                ],
                coordinators: [

            "hackathon": {
                title: "HACKSPIRIT 6.0",
                category: "HACKATHON",
                prize: "₹60,000",
                description: "A 24-hour intensive hackathon focused on solving real-world problems in AI, AgriTech, and IoT. Build a prototype, pitch it, and win big.",
                rules: [
                    "Team size: 2-4 members.",
                    "Development must happen within the 24-hour window.",
                    "Code must be pushed to a Git repository.",
                    "Final presentation involves a demo."
                ],
                coordinators: [
                    { name: "Sonal H", phone: "9591787616" },
                    { name: "Ashwin S", phone: "8951728170" }

        };

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let eventId = params.get('id');

            console.log("EVENT_ID:", eventId);

            if (!eventId || !eventsData[eventId]) {
                console.warn("NO EVENT ID FOUND, DEFAULTING TO SHARK TANK FOR TESTING...");
                eventId = 'shark-tank';
            }

            const data = eventsData[eventId];

            // Inject Content
            document.title = `${data.title} | NEXOVATE 2026`;
            document.getElementById('event-title').textContent = data.title;
            document.getElementById('event-category').textContent = data.category;
            document.getElementById('event-prize').textContent = `PRIZE_POOL: ${data.prize}`;
            document.getElementById('event-description').textContent = data.description;

            // Set Background
            const hero = document.getElementById('event-hero');
            hero.style.backgroundImage = `url('${data.image}')`;

            // Rulebook Link
            const rulebookLink = document.getElementById('rulebook-link');
            if (data.rulebook) {
                rulebookLink.href = data.rulebook;
                rulebookLink.target = "_blank";
                rulebookLink.style.display = 'inline-block';
            } else {
                rulebookLink.style.display = 'none';
            }

            // Register Link
            const registerLink = document.getElementById('register-link');
            if (data.registrationUrl) {
                registerLink.href = data.registrationUrl;
                registerLink.style.display = 'inline-block';
            } else {
                registerLink.style.display = 'none';
            }

            // Inject Rules
            const rulesList = document.getElementById('event-rules');
            rulesList.innerHTML = '';
            data.rules.forEach(rule => {
                const li = document.createElement('li');
                li.textContent = rule;
                rulesList.appendChild(li);
            });

            // Inject Contacts
            const contactsDiv = document.getElementById('event-contacts');
            contactsDiv.innerHTML = '';
            data.coordinators.forEach(coord => {
                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `
                    <div class="contact-info">
                        <div class="name">${coord.name}</div>
                        <div class="phone">${coord.phone}</div>
                    </div>
                    <a href="tel:${coord.phone}" class="call-btn">CALL</a>
                `;
                contactsDiv.appendChild(card);
            });

            // CPU Load Animation
            const cpuLoad = document.getElementById('cpu-load');
            setInterval(() => {
                const load = Math.floor(Math.random() * 20) + 30;
                if (cpuLoad) cpuLoad.textContent = `CPU_LOAD: ${load}%`;
            }, 3000);
        });
    </script>
</body>
</html>
